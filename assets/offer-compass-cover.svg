<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OfferCompass cover</title>
  <desc id="desc">A visual summary of OfferCompass: objective input, active research, evidence grading, and final offer decision.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.58" stop-color="#12343B"/>
      <stop offset="1" stop-color="#14532D"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.07"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <path d="M78 423C222 365 332 398 452 349C587 294 640 168 802 134C905 112 1011 143 1127 87" stroke="#7DD3FC" stroke-opacity="0.22" stroke-width="3"/>
  <path d="M82 454C242 405 343 429 496 380C674 323 723 219 881 199C977 187 1044 206 1130 154" stroke="#A7F3D0" stroke-opacity="0.18" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="64" y="64" width="1128" height="392" rx="24" fill="#0B1220" fill-opacity="0.42" stroke="#E2E8F0" stroke-opacity="0.16"/>
  </g>

  <g transform="translate(102 96)">
    <text x="0" y="48" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800" letter-spacing="0">OfferCompass</text>
    <text x="2" y="88" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" letter-spacing="0">Choose offers with evidence, not vibes.</text>
    <text x="2" y="128" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" letter-spacing="0">Startup vs Big Company · AI Roles · Compensation · Downside Risk</text>
  </g>

