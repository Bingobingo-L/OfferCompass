    <text x="22" y="70" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">cash · equity · unknowns</text>
    <text x="22" y="96" fill="#93C5FD" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">uncertainty is priced in</text>
