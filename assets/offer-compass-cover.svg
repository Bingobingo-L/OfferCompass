    <text x="22" y="70" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">background · role · pay</text>
    <text x="22" y="96" fill="#93C5FD" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">ask only what matters</text>
  </g>

  <g transform="translate(381 238)">
