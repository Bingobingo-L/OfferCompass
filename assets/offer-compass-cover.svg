    <text x="88" y="206" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">S</text>
    <text x="6" y="97" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">W</text>
    <text x="196" y="97" fill="#E0F2FE" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">E</text>
