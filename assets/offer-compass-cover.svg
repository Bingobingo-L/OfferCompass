    <text x="22" y="38" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700">Active Research</text>
    <text x="22" y="70" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">company · team · funding</text>
    <text x="22" y="96" fill="#93C5FD" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">search beyond the JD</text>
  </g>

